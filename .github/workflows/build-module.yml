name: Build Module

on:
  workflow_call:
    inputs:
      module:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.module }}:${{ github.sha }}
          
          docker build \
            --build-arg MODULE=${{ inputs.module }} \
            -f build.dockerfile \
            -t $IMAGE \
            .

      - name: Push Docker
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/${{ inputs.module }}:${{ github.sha }}
          docker push $IMAGE
name: Main Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [main]

jobs:
  detect:
    uses: ./.github/workflows/detect-changes.yml

  build:
    needs: detect
    strategy:
      matrix:
        module: [ "maui-backend", "service-templete" ]

    uses: ./.github/workflows/build-module.yml
    with:
      module: ${{ matrix.module }}